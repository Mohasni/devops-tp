apiVersion: apps/v1
kind: Deployment
metadata:
  name: mon-app-js
  labels:
    app: mon-app-js
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mon-app-js
  template:
    metadata:
      labels:
        app: mon-app-js
    spec:
      containers:
      - name: mon-app-js
        image: mon-app-js:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5